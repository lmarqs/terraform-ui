[tools]
gh = "2.92"
go = "1.25"
golangci-lint = "2.12"
goreleaser = "2.15"
node = "22.21"
opentofu = "1.9"
ruby = "3.4"
terraform = "1.14"
terragrunt = "0.77"

[env]
_.python.venv = { path = ".venv", create = true }
_.file = ".env"

# ─── Developer tools ────────────────────────────────────────────────────────────

[tasks.dev]
run = "go run ./cmd/tfui"
description = "Run TUI in development mode"

[tasks.fmt]
run = "golangci-lint fmt ./..."
description = "Format Go source files"

[tasks.setup]
run = """
npm ci
pip install -r requirements.txt -q
cd docs && bundle install -q
go install gotest.tools/gotestsum@latest
"""
description = "Bootstrap all dependencies (node, python, ruby, go tools)"

# ─── Check (static analysis) ───────────────────────────────────────────────────

[tasks."check:lint"]
run = "golangci-lint run ./..."
description = "Full lint suite (golangci-lint)"

# ─── Build (produce artifacts) ──────────────────────────────────────────────────

[tasks.build]
run = "goreleaser build --snapshot --clean"
description = "Build cross-platform binaries (goreleaser snapshot)"

# ─── Test (verify correctness) ──────────────────────────────────────────────────

[tasks."test:unit"]
run = """
mkdir -p reports
gotestsum --junitfile reports/junit.xml -- ./...
"""
description = "Unit tests (JUnit XML in reports/)"

[tasks."test:coverage"]
run = """
packages=$(go list ./... | grep -v '/cmd/' | grep -v 'internal/terraform/exec$')
go test -coverprofile=coverage.out $packages
total=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $3}' | tr -d '%')
echo "Coverage: ${total}%"
threshold=100
if awk "BEGIN {exit !($total < $threshold)}"; then
  echo "FAIL: ${total}% is below ${threshold}% threshold"
  exit 1
fi
"""
description = "Coverage enforcement (100%, excludes cmd/ and internal/terraform/exec)"

[tasks."test:integration:terraform"]
run = "go test -tags integration -timeout 300s ./tests/integration/..."
description = "Integration tests with terraform"

[tasks."test:integration:tofu"]
run = """
if ! command -v tofu &>/dev/null; then echo "SKIP: tofu not found"; exit 0; fi
TFUI_TEST_BINARY=tofu go test -tags integration -timeout 300s -run 'TestPipeline' ./tests/integration/...
"""
description = "Integration tests with OpenTofu"

[tasks."test:integration:terragrunt"]
run = """
if ! command -v terragrunt &>/dev/null; then echo "SKIP: terragrunt not found"; exit 0; fi
TFUI_TEST_BINARY=terragrunt go test -tags integration -timeout 300s -run 'TestPipeline' ./tests/integration/...
"""
description = "Integration tests with Terragrunt"

[tasks."test:macro"]
run = """
TFUI="${1:-dist/tfui_$(go env GOOS)_$(go env GOARCH)*/tfui}"
TFUI=$(ls $TFUI 2>/dev/null | head -1)
if [ -z "$TFUI" ] || [ ! -x "$TFUI" ]; then
  echo "ERROR: no binary found at $TFUI — run 'mise run build' first"
  exit 1
fi
failed=0
for tape in tests/fixtures/tapes/*.tape; do
  case "$(basename "$tape")" in
    assertion_fail.tape|state_tree.tape) continue ;;
  esac
  echo "=== $(basename "$tape") ==="
  if ! "$TFUI" --plan ./tests/fixtures/plan.json --state ./tests/fixtures/state.json --macro "./$tape"; then
    failed=$((failed + 1))
  fi
done
if [ $failed -gt 0 ]; then
  echo "FAIL: $failed tape(s) failed"
  exit 1
fi
echo "All tapes passed."
"""
description = "Macro tapes against built binary (blackbox)"

# ─── Docs (Jekyll site) ────────────────────────────────────────────────────────

[tasks."docs:install"]
run = "bundle install"
dir = "docs"
description = "Install Jekyll gem dependencies"

[tasks."docs:serve"]
run = "bundle exec jekyll serve --livereload"
dir = "docs"
description = "Serve docs site locally with live reload"

[tasks."docs:build"]
run = "bundle exec jekyll build"
dir = "docs"
description = "Build docs site for production"

# ─── Demo (developer tools) ────────────────────────────────────────────────────

[tasks."demo:generate"]
run = "./demo/generate.sh"
description = "Record demo tapes and generate GIFs"

[tasks."demo:lock"]
run = "pip freeze > requirements.txt"
description = "Lock current Python venv to requirements.txt"

# ─── Release (CI only) ─────────────────────────────────────────────────────────

[tasks."release:prepare"]
run = """
echo ${1} > VERSION
mise run build
mise run demo:generate
"""
description = "Write version, build snapshot, regenerate demo GIFs (called by semantic-release)"

[tasks."release:publish"]
run = "goreleaser release --clean --skip=validate"
description = "goreleaser release (called by semantic-release)"

[tasks.release]
run = "npx semantic-release"
description = "Semantic-release (CI only, requires GITHUB_TOKEN)"
