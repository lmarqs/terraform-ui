[tools]
go = "1.22"
terraform = "1.14"
node = "22"

[tasks.fmt]
run = "gofmt -w cmd/ internal/ plugins/"
description = "Format Go source files"

[tasks.build]
depends = ["fmt", "lint"]
run = """
#!/usr/bin/env bash
set -euo pipefail
version="${1:-$(cat VERSION)}"
go build -ldflags "-X main.version=${version}" -o dist/tfui ./cmd/tfui
"""
description = "Build Go binary to dist/tfui (runs fmt + lint first)"

[tasks.setup]
run = """
#!/usr/bin/env bash
set -euo pipefail
npm ci
go install gotest.tools/gotestsum@latest
"""
description = "Install dependencies (npm + go tools)"

[tasks.test]
run = "go test ./..."
description = "Run Go unit tests"

[tasks."test:run"]
depends = ["lint"]
run = """
#!/usr/bin/env bash
set -euo pipefail
mkdir -p reports
gotestsum --junitfile reports/junit.xml -- ./...
"""
description = "Run tests with JUnit XML output (CI)"

[tasks.lint]
run = "go vet ./..."
description = "Run go vet on all packages"

[tasks."coverage:run"]
run = """
#!/usr/bin/env bash
set -euo pipefail
# Exclude cmd/ and internal/terraform (terraform-exec I/O) from coverage
packages=$(go list ./... | grep -v '/cmd/' | grep -v 'internal/terraform$')
go test -coverprofile=coverage.out $packages
go tool cover -func=coverage.out
total=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
echo "Total coverage: ${total}%"
if (( $(echo "$total < 90" | bc -l) )); then
  echo "ERROR: Coverage is below 90% (got ${total}%)"
  exit 1
fi
echo "Coverage OK (target: 90%, excluding cmd/ and internal/terraform)"
"""
description = "Run Go tests with 90% coverage (excludes cmd/ and terraform-exec I/O)"

[tasks.run]
run = "go run ./cmd/tfui"
description = "Run tfui TUI in development mode"

[tasks."test:integration"]
run = "go test -tags integration -timeout 300s ./tests/integration/..."
description = "Run integration tests (requires terraform on PATH)"

[tasks.release]
run = "npx semantic-release"
description = "Run semantic-release (CI only)"
