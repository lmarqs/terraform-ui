title: tfui
description: >-
  A k9s-style TUI for Terraform. Review plans as a tree, analyze risk,
  browse state, and apply — all from the terminal. Works with Terraform,
  OpenTofu, and Terragrunt.
url: https://lmarqs.github.io/terraform-ui
baseurl: /terraform-ui

theme: just-the-docs

color_scheme: dark

search_enabled: true
search:
  heading_level: 2
  previews: 3

heading_anchors: true
back_to_top: true

aux_links:
  "GitHub":
    - "//github.com/lmarqs/terraform-ui"
aux_links_new_tab: true

nav_enabled: true

collections:
  roadmap:
    output: true
    permalink: /roadmap/:name/

just_the_docs:
  collections:
    roadmap:
      name: Roadmap
      nav_fold: true

ga_tracking: G-4D40875MH6

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
