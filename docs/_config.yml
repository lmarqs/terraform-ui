title: terraform-ui
description: Interactive terminal UI for Terraform operations
url: https://lmarqs.github.io/terraform-ui
baseurl: /terraform-ui

theme: minima

header_pages:
  - index.md
  - getting-started.md
  - configuration.md
  - plugins/index.md
  - architecture.md
  - risk-analysis.md
  - phantom-changes.md
  - blast-radius.md
  - cli-reference.md

collections:
  plugins:
    output: true
    permalink: /plugins/:name/

defaults:
  - scope:
      path: "plugins"
      type: "plugins"
    values:
      layout: plugin

jekyll_plugins:
  - jekyll-seo-tag
