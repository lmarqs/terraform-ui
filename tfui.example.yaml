# tfui.yaml — project configuration for terraform-ui
# Place this file in your repository root.

# Terraform configuration
terraform:
  # Path to terraform (or tofu) binary (auto-detects if omitted: prefers tofu, falls back to terraform)
  # bin: tofu

# Cache configuration
cache:
  # Prompt before destructive ops if data older than this
  staleness_threshold: 5m

# AI integration (uses AWS Bedrock with default credential chain)
# ai:
#   enabled: true
#   provider: bedrock
#   model: us.anthropic.claude-sonnet-4-6-v1
#   region: us-east-1  # optional: defaults to AWS_REGION env var

# Context discovery for monorepos (similar to pnpm-workspace.yaml)
# Define glob patterns to locate independent terraform projects.
context:
  paths:
    - "modules/*"
    # - "envs/*"
    # - "infra/**"

# Plugin configuration (map of plugin ID → config)
# All plugins are enabled by default. Only list ones you want to customize.
plugins:
  risk:
    enabled: true
    # custom_rules:
    #   - type: "aws_lambda_function"
    #     level: critical

  apply:
    enabled: true
    # auto_approve: false

  # Disable a plugin:
  # blastradius:
  #   enabled: false
