name: Main

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
    branches:
      - main

env:
  # Required until actions (checkout, upload-artifact, etc.) ship Node 24 natively
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    uses: ./.github/workflows/build.yaml

  test:
    uses: ./.github/workflows/test.yaml
    needs: build
    permissions:
      checks: write
      contents: read

  release:
    uses: ./.github/workflows/release.yaml
    needs: test
    permissions:
      contents: write
