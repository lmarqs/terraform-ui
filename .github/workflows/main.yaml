name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize]
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    uses: ./.github/workflows/build.yaml
    permissions:
      contents: read

  report:
    if: always()
    needs: build
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: test-reports
          path: reports/
      - uses: dorny/test-reporter@v1
        with:
          name: Tests
          path: reports/*.xml
          reporter: java-junit

  test:
    needs: [build, report]
    uses: ./.github/workflows/test.yaml
    permissions:
      contents: read

  release:
    if: github.event_name == 'push'
    needs: test
    uses: ./.github/workflows/release.yaml
    permissions:
      actions: write
      contents: write
    secrets: inherit
