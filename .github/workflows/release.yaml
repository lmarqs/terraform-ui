name: Release

on:
  workflow_call:

env:
  # Required until actions (checkout, upload-artifact, etc.) ship Node 24 natively
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  main:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          base_version=$(cat VERSION)
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=v${base_version}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            timestamp=$(date -u +%Y%m%d%H%M%S)
            echo "tag=v${base_version}-rc.${timestamp}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          flags=""
          if [ "${{ steps.version.outputs.prerelease }}" = "true" ]; then
            flags="--prerelease"
          else
            flags="--latest"
          fi

          gh release create "${{ steps.version.outputs.tag }}" \
            $flags \
            --generate-notes \
            artifacts/tfui/tfui.sh \
            artifacts/test-report-ubuntu-latest/*.xml \
            artifacts/test-report-macos-latest/*.xml
