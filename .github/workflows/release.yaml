name: Release

on:
  workflow_call:

env:
  # Required until actions (checkout, upload-artifact, etc.) ship Node 24 natively
  # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  main:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Resolve version
        id: version
        run: |
          base_version=$(cat artifacts/tfui/VERSION)
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${base_version}" >> "$GITHUB_OUTPUT"
          else
            timestamp=$(date -u +%Y%m%d%H%M%S)
            echo "version=${base_version}-rc.${timestamp}" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          tar -czf "release-assets/tfui-${{ steps.version.outputs.version }}.tar.gz" -C artifacts/tfui .
          cp artifacts/test-report-ubuntu-latest/report.xml release-assets/test-report-ubuntu.xml
          cp artifacts/test-report-macos-latest/report.xml release-assets/test-report-macos.xml

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ steps.version.outputs.version }}"
          flags=""
          if [[ "$tag" == *"-rc."* ]]; then
            flags="--prerelease"
          else
            flags="--latest"
          fi

          gh release create "$tag" \
            $flags \
            --generate-notes \
            --repo "${{ github.repository }}" \
            release-assets/*
