name: Release

on:
  workflow_call:

env:
  # Required until actions (checkout, upload-artifact, etc.) ship Node 24 natively
  # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  main:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Resolve version
        id: version
        run: |
          base_version=$(cat artifacts/tfui/VERSION)
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${base_version}" >> "$GITHUB_OUTPUT"
          else
            timestamp=$(date -u +%Y%m%d%H%M%S)
            echo "version=${base_version}-rc.${timestamp}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ steps.version.outputs.version }}"
          gh api "repos/${{ github.repository }}/git/refs" \
            --method POST \
            --field "ref=refs/tags/${tag}" \
            --field "sha=${{ github.sha }}"

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp artifacts/tarball/tfui-*.tar.gz release-assets/
          cp artifacts/changelog/CHANGELOG.md release-assets/CHANGELOG.md
          cp artifacts/test-report-ubuntu-latest/report.xml release-assets/test-report-ubuntu.xml
          cp artifacts/test-report-macos-latest/report.xml release-assets/test-report-macos.xml

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ steps.version.outputs.version }}"
          flags=""
          if [[ "$tag" == *"-rc."* ]]; then
            flags="--prerelease"
          else
            flags="--latest"
          fi

          gh release create "$tag" \
            $flags \
            --generate-notes \
            --repo "${{ github.repository }}" \
            release-assets/*

      - name: Commit changelog and version
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          repo="${{ github.repository }}"
          version="${{ steps.version.outputs.version }}"

          changelog_content=$(base64 -w 0 artifacts/changelog/CHANGELOG.md)
          changelog_sha=$(gh api "repos/${repo}/contents/CHANGELOG.md" --jq '.sha' 2>/dev/null || echo "")
          params=$(jq -n \
            --arg message "chore(release): v${version} [skip ci]" \
            --arg content "$changelog_content" \
            --arg sha "$changelog_sha" \
            '{message: $message, content: $content, committer: {name: "github-actions[bot]", email: "github-actions[bot]@users.noreply.github.com"}} + (if $sha != "" then {sha: $sha} else {} end)')
          gh api "repos/${repo}/contents/CHANGELOG.md" \
            --method PUT \
            --input - <<< "$params"

          version_content=$(echo -n "$version" | base64 -w 0)
          version_sha=$(gh api "repos/${repo}/contents/VERSION" --jq '.sha')
          params=$(jq -n \
            --arg message "chore(release): update VERSION to ${version} [skip ci]" \
            --arg content "$version_content" \
            --arg sha "$version_sha" \
            '{message: $message, content: $content, committer: {name: "github-actions[bot]", email: "github-actions[bot]@users.noreply.github.com"}, sha: $sha}')
          gh api "repos/${repo}/contents/VERSION" \
            --method PUT \
            --input - <<< "$params"
