name: Release

on:
  workflow_call:

env:
  # Required until actions (checkout, upload-artifact, etc.) ship Node 24 natively
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  main:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: simple

      - name: Checkout code
        if: steps.release.outputs.release_created
        uses: actions/checkout@v4

      - name: Download artifacts
        if: steps.release.outputs.release_created
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Upload release assets
        if: steps.release.outputs.release_created
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.release.outputs.tag_name }}" \
            artifacts/tfui/tfui.sh \
            artifacts/test-report-ubuntu-latest/*.xml \
            artifacts/test-report-macos-latest/*.xml
