name: Release

on:
  workflow_call:

jobs:
  main:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp artifacts/tfui/tfui.sh release-assets/
          cp artifacts/test-report-ubuntu-latest/*.xml release-assets/test-report-ubuntu.xml
          cp artifacts/test-report-macos-latest/*.xml release-assets/test-report-macos.xml

      - name: Get version
        id: version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          SHORT_SHA=$(git rev-parse --short HEAD)

          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TAG="v0.${COMMIT_COUNT}.0"
          else
            TAG="v0.${COMMIT_COUNT}.0-rc.${SHORT_SHA}"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create tag
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: release-assets/*
