name: Release

on:
  workflow_call:
    inputs:
      version:
        description: "Version to release"
        required: true
        type: string

env:
  # Required until actions (checkout, upload-artifact, etc.) ship Node 24 natively
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  main:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          tar -czf "release-assets/tfui-${{ inputs.version }}.tar.gz" -C artifacts/tfui .
          cp artifacts/test-report-ubuntu-latest/report.xml release-assets/test-report-ubuntu.xml
          cp artifacts/test-report-macos-latest/report.xml release-assets/test-report-macos.xml

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ inputs.version }}"
          flags=""
          if [[ "$tag" == *"-rc."* ]]; then
            flags="--prerelease"
          else
            flags="--latest"
          fi

          gh release create "$tag" \
            $flags \
            --generate-notes \
            --repo "${{ github.repository }}" \
            release-assets/*
