name: Test

on:
  workflow_call:

jobs:
  main:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      checks: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare Environment
        uses: ./.github/actions/prepare-env

      - name: Test
        run: mise run test:run

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Tests (${{ matrix.os }})
          path: reports/*.xml
          reporter: java-junit
          fail-on-empty: 'false'

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare Environment
        uses: ./.github/actions/prepare-env

      - name: Coverage
        run: mise run coverage:run

      - name: Coverage Report
        if: always()
        run: |
          if [ -f coverage/kcov-merged/cobertura.xml ]; then
            LINE_RATE=$(grep -oP 'line-rate="\K[^"]+' coverage/kcov-merged/cobertura.xml | head -1)
            PERCENT=$(awk "BEGIN {printf \"%.1f\", $LINE_RATE * 100}")
            echo "## Coverage: ${PERCENT}%" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Full report available as artifact." >> "$GITHUB_STEP_SUMMARY"
          elif [ -d coverage/bats.*/cobertura.xml ]; then
            LINE_RATE=$(grep -oP 'line-rate="\K[^"]+' coverage/bats.*/cobertura.xml | head -1)
            PERCENT=$(awk "BEGIN {printf \"%.1f\", $LINE_RATE * 100}")
            echo "## Coverage: ${PERCENT}%" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Coverage: report generated" >> "$GITHUB_STEP_SUMMARY"
            echo "Check artifacts for details." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Coverage Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
