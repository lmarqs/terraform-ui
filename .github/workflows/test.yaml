name: Test

on:
  workflow_call:

jobs:
  main:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      checks: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare Environment
        uses: ./.github/actions/prepare-env

      - name: Test
        run: mise run test:run

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Tests (${{ matrix.os }})
          path: reports/*.xml
          reporter: java-junit
          fail-on-empty: 'false'

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare Environment
        uses: ./.github/actions/prepare-env

      - name: Coverage
        run: mise run coverage:run

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: coverage
