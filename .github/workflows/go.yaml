name: Go

on:
  push:
    branches: [feat/go-rewrite, main]
  pull_request:
    branches: [feat/go-rewrite, main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        run: go build ./cmd/tfui

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...
