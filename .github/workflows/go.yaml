name: Go

on:
  push:
    branches: [feat/go-rewrite, main]
    paths:
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - "plugins/**"
      - ".goreleaser.yaml"
      - ".github/workflows/go.yaml"
    tags:
      - "v*"
  pull_request:
    branches: [feat/go-rewrite, main]
    paths:
      - "cmd/**"
      - "internal/**"
      - "plugins/**"
      - "go.mod"
      - "go.sum"
      - ".goreleaser.yaml"
      - ".github/workflows/go.yaml"

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        terraform: [terraform, tofu]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install Terraform
        if: matrix.terraform == 'terraform'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14"
          terraform_wrapper: false

      - name: Install OpenTofu
        if: matrix.terraform == 'tofu'
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.9"
          tofu_wrapper: false

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test with coverage (100% required)
        run: |
          go test -coverprofile=coverage.out ./...
          total=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${total}%"
          if (( $(echo "$total < 100" | bc -l) )); then
            echo "::error::Coverage is below 100% (got ${total}%)"
            exit 1
          fi

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.terraform == 'terraform'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

      - name: Validate goreleaser config
        if: matrix.os == 'ubuntu-latest' && matrix.terraform == 'terraform'
        uses: goreleaser/goreleaser-action@v6
        with:
          args: check
          version: "~> v2"

  version:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm ci

      - name: Semantic Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
          version: "~> v2"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
