name: Feature Request
description: Suggest an improvement or new feature
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to accomplish? What's frustrating or missing?
      placeholder: |
        When working with large state files, I often need to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about or workarounds you're using.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of tfui does this relate to?
      options:
        - TUI (interactive interface)
        - CLI (commands, flags, output)
        - Plugins (state, plan, apply, etc.)
        - Configuration (tfui.hcl)
        - CI/CD integration
        - Documentation
    validations:
      required: true
